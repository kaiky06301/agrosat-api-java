# ============================================================
# Perfil ORACLE (FIAP) - PREENCHA as credenciais abaixo.
# Exemplo de URL FIAP: jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@oracle.fiap.com.br:1521:ORCL
spring.datasource.username=SEU_RM_AQUI
spring.datasource.password=SUA_SENHA_AQUI
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
# As tabelas ja existem (database/01_ddl.sql). NAO deixar o Hibernate alterar o schema.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
