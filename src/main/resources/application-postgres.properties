# ============================================================
# Perfil POSTGRES — deploy na nuvem (Render / Railway, plano free)
# A URL/usuário/senha do banco vêm das variáveis de ambiente:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://<HOST>:5432/<DATABASE>
#   SPRING_DATASOURCE_USERNAME=<user>
#   SPRING_DATASOURCE_PASSWORD=<password>
# (o Spring mapeia essas env vars automaticamente para spring.datasource.*)
# ============================================================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# O Postgres do Render começa vazio -> o Hibernate cria as tabelas a partir das entidades.
# O DataSeeder cria o usuário admin (admin@agrosat.com.br / 123456) via JPA.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
