# ============================================================
# AgroSat API - configuracao Spring Boot
# Perfil ativo por padrao: oracle (FIAP). Para teste rapido use o perfil h2.
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2
# ============================================================
spring.application.name=agrosat-api
spring.profiles.active=oracle

# ---- Servidor ----
server.port=8080

# ---- JWT ----
# IMPORTANTE: troque por um segredo proprio (minimo 32 caracteres / 256 bits).
agrosat.jwt.secret=troque-este-segredo-por-uma-chave-bem-grande-256-bits-agrosat
# Validade do token em milissegundos (padrao 24h)
agrosat.jwt.expiration=86400000

# ---- Swagger / OpenAPI ----
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ---- JPA (comum) ----
spring.jpa.open-in-view=false
