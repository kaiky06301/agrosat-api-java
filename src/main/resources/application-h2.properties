# ============================================================
# Perfil H2 (teste rapido em memoria) - sem precisar do Oracle.
#   mvn spring-boot:run -Dspring-boot.run.profiles=h2
# Console H2: http://localhost:8080/h2-console  (JDBC URL abaixo)
# ============================================================
spring.datasource.url=jdbc:h2:mem:agrosat;DB_CLOSE_DELAY=-1;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Em memoria: o Hibernate cria as tabelas a partir das entidades.
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
